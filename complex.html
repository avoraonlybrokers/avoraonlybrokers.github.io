<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AVORA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
</head>
<body>

<header id="avora-header"></header>

<main>
  <div class="carousel hidden" id="complex-carousel"></div>

  <div class="container" style="padding-top:40px;padding-bottom:80px;max-width:760px;">
    <div id="complex-summary" class="reveal"></div>

    <div id="complex-blocks">
      <section class="block-item hidden" id="block-about">
        <h3 style="font-size:24px" data-i18n="about"></h3>
        <p id="about-text" style="margin-top:16px;line-height:1.7;color:rgba(247,247,245,0.8);white-space:pre-line"></p>
      </section>

      <section class="block-item hidden" id="block-format">
        <h3 style="font-size:24px" data-i18n="format"></h3>
        <p id="format-text" style="margin-top:16px;line-height:1.7;color:rgba(247,247,245,0.8);white-space:pre-line"></p>
      </section>

      <section class="block-item hidden" id="block-payment">
        <h3 style="font-size:24px" data-i18n="payment_plan"></h3>
        <p id="payment-text" style="margin-top:16px;line-height:1.7;color:rgba(247,247,245,0.8);white-space:pre-line"></p>
      </section>

      <section class="block-item hidden" id="block-amenities"></section>

      <section class="block-item hidden" id="block-apartments">
        <h3 style="font-size:24px;margin-bottom:16px" data-i18n="apartments_title"></h3>
        <div id="apartments-list"></div>
      </section>

      <section class="block-item hidden" id="block-extra">
        <h3 style="font-size:24px" data-i18n="extra"></h3>
        <p id="extra-text" style="margin-top:16px;line-height:1.7;color:rgba(247,247,245,0.8);white-space:pre-line"></p>
      </section>

      <section class="block-item" id="block-trust"></section>

      <section class="block-item" id="block-map"></section>

      <section class="block-item" id="block-lead"></section>
    </div>
  </div>
</main>

<footer id="avora-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/i18n.js"></script>
<script src="js/shared.js"></script>
<script src="js/components.js"></script>
<script src="js/complex.js"></script>
</body>
</html>
