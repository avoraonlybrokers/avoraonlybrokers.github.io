<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guide — AVORA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
</head>
<body>

<!-- ============================================================
     Фоновое видео на всех страницах
     ============================================================ -->
<div id="global-bg-video">
  <video id="global-hero-video" autoplay muted loop playsinline></video>
  <div class="global-bg-scrim"></div>
</div>

<!-- ============================================================
     ВЕСЬ КОНТЕНТ — ПОВЕРХ ФОНА
     ============================================================ -->
<div class="global-bg-content">

  <header id="avora-header"></header>

  <main>
    <div class="guide-cover hidden" id="guide-hero" style="aspect-ratio:21/9;max-height:420px;min-height:200px"></div>

    <div class="container" style="padding-top:40px;padding-bottom:80px;max-width:720px;">
      <a href="guides.html" style="display:inline-flex;align-items:center;gap:6px;font-size:14px;color:rgba(247,247,245,0.6)">
        <i data-lucide="chevron-left" width="15" height="15"></i><span data-i18n="back_to_guides"></span>
      </a>

      <div id="guide-header" class="reveal" style="margin-top:20px"></div>
      <div id="guide-content" class="guide-content" style="margin-top:32px"></div>
    </div>
  </main>

  <footer id="avora-footer"></footer>

</div>
<!-- ============================================================
     КОНЕЦ КОНТЕНТА
     ============================================================ -->

<!-- Модалка входа в админку -->
<div id="avora-admin-overlay" class="modal-overlay">
  <div class="modal-panel">
    <button class="modal-close" id="avora-admin-close"><i data-lucide="x" width="18" height="18"></i></button>
    <div class="modal-header">
      <div class="modal-icon"><i data-lucide="lock" width="18" height="18"></i></div>
      <h2 data-i18n="admin_modal_title"></h2>
      <p data-i18n="admin_password_label"></p>
    </div>
    <form id="avora-admin-form">
      <input type="password" class="form-field" id="avora-admin-password" required autocomplete="current-password" data-i18n-placeholder="admin_password_placeholder" />
      <p class="form-error hidden" id="avora-admin-error" data-i18n="admin_invalid"></p>
      <button type="submit" class="btn-gold" id="avora-admin-submit" data-i18n="admin_login"></button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/i18n.js"></script>
<script src="js/shared.js"></script>
<script src="js/components.js"></script>
<script src="js/guide.js"></script>

<!-- Инициализация глобального видео-фона -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof avoraInitGlobalBg === 'function') {
      avoraInitGlobalBg();
    }
  });
</script>

</body>
</html>
