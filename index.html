<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AVORA — Premium Real Estate | Dubai, Bali, Thailand</title>
<meta name="description" content="AVORA by Onlybrokers Partner. Premium residences in Dubai, Bali, and Thailand — direct from the developer." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
</head>
<body>

<header id="avora-header"></header>

<main>
  <section class="hero" id="hero">
    <div class="hero-fallback-bg" id="hero-fallback"></div>
    <video id="hero-video" autoplay loop muted playsinline preload="metadata" class="hidden"></video>
    <div class="hero-scrim"></div>
    <div class="hero-content">
      <div class="eyebrow"><i data-lucide="gem" width="16" height="16"></i><span data-i18n="brand_tagline"></span></div>
      <h1 class="hero-title font-display" data-i18n="brand_name"></h1>
      <p class="hero-by" data-i18n="brand_by"></p>
      <p class="hero-regions" data-i18n="brand_regions"></p>
      <div class="hero-cta-wrap">
        <a href="#projects" class="btn-outline-gold" data-i18n="hero_cta"></a>
      </div>
    </div>
    <div class="scroll-hint"><i data-lucide="arrow-down" width="18" height="18"></i></div>
  </section>

  <section class="block" id="projects">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="direct_from_developer"></span>
        <h2 class="font-display" data-i18n="listing_title"></h2>
        <p data-i18n="listing_subtitle"></p>
      </div>
      <div id="projects-grid" class="grid-cards"></div>
      <p id="projects-empty" class="hidden" data-i18n="listing_empty" style="color:rgba(247,247,245,0.5)"></p>
    </div>
  </section>

  <section class="block" id="guides-teaser">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="nav_guides"></span>
        <h2 class="font-display" data-i18n="guides_title"></h2>
        <p data-i18n="guides_subtitle"></p>
      </div>
      <div id="guides-grid" class="guide-grid"></div>
      <p id="guides-empty" class="hidden" data-i18n="guides_empty" style="color:rgba(247,247,245,0.5)"></p>
      <div class="text-center mt-8">
        <a href="guides.html" class="btn-outline-gold" style="display:inline-flex">
          <span data-i18n="guides_view_all"></span>
        </a>
      </div>
    </div>
  </section>

  <section class="block" id="developers-teaser">
    <div class="container">
      <div class="section-head reveal">
        <span class="eyebrow" data-i18n="developers_subtitle"></span>
        <h2 class="font-display" data-i18n="developers_title"></h2>
      </div>
      <div id="developers-grid" class="developer-grid"></div>
    </div>
  </section>
</main>

<footer id="avora-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/i18n.js"></script>
<script src="js/shared.js"></script>
<script src="js/components.js"></script>
<script src="js/home.js"></script>
</body>
</html>
